name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: catastrophes-app
        run: npm install

      - name: Build Vite app
        working-directory: catastrophes-app
        run: npm run build

      - name: Install diagram app dependencies
        working-directory: diagram-app
        run: npm install

      - name: Build diagram app
        working-directory: diagram-app
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          mkdir -p _site/catastrophes
          cp -r catastrophes-app/dist/. _site/catastrophes/
          mkdir -p _site/diagram
          cp -r diagram-app/dist/. _site/diagram/
          mkdir -p _site/static_pages
          cp -r static_pages/. _site/static_pages/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
